name: Publish notebooklm-mcp

on:
  push:
    paths: ['packages/notebooklm-mcp/package.json']
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_version_bump:
        description: 'Skip version bump (publish current version)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: publish-notebooklm-mcp-${{ github.ref }}
  cancel-in-progress: false

env:
  # Registered MCPServer id in KFDB / the gateway. We standardize on the
  # established notebook-studio serverId (the id `connect` already uploads
  # NOTEBOOKLM_STATE_B64 under and the id the notebook-studio agent references),
  # so per-wallet secret injection lines up and already-connected wallets are
  # drop-in. (Canonical uuidv5(DNS, "@rickydata/notebooklm-mcp") would be
  # dd3c273b-721d-5f3c-a12c-4784e822a041; we deliberately reuse 1834da3e.)
  SERVER_ID: 1834da3e-8ba4-43b2-b8ea-b7207570f2e0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # Deterministic install from the committed root lockfile. Skip the
        # Playwright browser download — it's a dev-only dep, never needed in CI.
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --no-audit --no-fund

      - name: Ensure Linux rollup binary (npm optional-deps bug workaround)
        # The lockfile was generated on macOS, so it lacks a package record for
        # the linux rollup native binary that vitest/rollup needs at runtime
        # (npm/cli#4828). Install the platform-matched binary explicitly, pinned
        # to the resolved rollup version, without touching the lockfile.
        run: |
          ROLLUP_VERSION=$(node -p "require('rollup/package.json').version")
          npm install --no-save --no-audit --no-fund \
            "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"

      - name: Build
        run: npm run build --workspace @rickydata/notebooklm-mcp

      - name: Test
        run: npm run test --workspace @rickydata/notebooklm-mcp

      - name: Verify tools/list (captured actions only, stdio, no network)
        id: tools
        run: |
          init='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}'
          list='{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'
          extract='let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{for(const l of d.split("\n")){if(!l.trim())continue;let o;try{o=JSON.parse(l)}catch{continue};if(o.id===2){console.log(JSON.stringify(o.result.tools.map(t=>t.name)))}}})'
          # No session env → tools/list must still succeed (no network) and expose
          # exactly the captured set.
          NAMES=$(printf '%s\n%s\n' "$init" "$list" \
            | env NOTEBOOKLM_STATE_PATH=/nonexistent NOTEBOOKLM_COOKIES= NOTEBOOKLM_STATE_B64= \
              node packages/notebooklm-mcp/dist/index.js 2>/dev/null | node -e "$extract")
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"
          echo "::notice::tools/list = $NAMES"
          EXPECTED='["add_source","generate_audio","get_audio_status","download_audio"]'
          [ "$NAMES" = "$EXPECTED" ] || { echo "::error::expected $EXPECTED, got $NAMES"; exit 1; }

      - name: Bump patch version
        if: inputs.skip_version_bump != 'true'
        run: npm version patch --no-git-tag-version --workspace @rickydata/notebooklm-mcp

      - name: Capture version
        id: ver
        run: |
          VERSION=$(node -p "require('./packages/notebooklm-mcp/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Skip if already published
        id: check
        run: |
          if npm view "@rickydata/notebooklm-mcp@${{ steps.ver.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@rickydata/notebooklm-mcp@${{ steps.ver.outputs.version }} already on npm; skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        id: publish
        if: steps.check.outputs.exists == 'false'
        # Publish from inside the package dir (NOT `npm publish --workspace`,
        # which 404s on first publish of a new scoped package). Mirrors the
        # working kfdb-code-mcp / agent0-mcp publish workflows.
        working-directory: packages/notebooklm-mcp
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Update KFDB MCPServer entity (version + tools_available)
        if: steps.publish.outcome == 'success'
        # serverId = uuidv5(DNS, "@rickydata/notebooklm-mcp"). Sharing policy is
        # `isolated`: each wallet's NotebookLM session secret is per-wallet,
        # AES-256-GCM, never shared. (The per-wallet session secret itself is the
        # NOTEBOOKLM_STATE_B64 vault entry uploaded by `rickydata notebook-studio
        # connect` / `notebooklm-mcp connect --deploy`.)
        run: |
          ( printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' ; sleep 2 ) \
            | NOTEBOOKLM_STATE_PATH=/nonexistent node packages/notebooklm-mcp/dist/index.js 2>/dev/null \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{for(const l of d.split('\n')){if(!l.trim())continue;let o;try{o=JSON.parse(l)}catch{continue};if(o.id===2)require('fs').writeFileSync('/tmp/tools_available.json',JSON.stringify(o.result.tools))}})"
          node -e "
            const fs=require('fs');
            const tools=JSON.parse(fs.readFileSync('/tmp/tools_available.json','utf8'));
            const v='${{ steps.ver.outputs.version }}';
            const payload={operations:[{operation:'update_node',id:'${{ env.SERVER_ID }}',label:'MCPServer',properties:{
              version:{String:v}, latest_version:{String:v}, tools_count:{Integer:tools.length},
              tools_available:{String:JSON.stringify(tools)},
              sharing:{String:'isolated'},
              install_command:{String:'npx -y @rickydata/notebooklm-mcp@'+v},
              run_command:{String:'npx -y @rickydata/notebooklm-mcp@'+v},
              enriched_at:{String:new Date().toISOString()}, enrichment_version:{Integer:1},
            }}]};
            fs.writeFileSync('/tmp/nlm-payload.json', JSON.stringify(payload));
            console.log('KFDB payload: '+tools.length+' tools, v'+v);
          "
          curl -sf -X POST "${{ vars.KFDB_URL || 'http://34.60.37.158' }}/api/v1/write" \
            -H "Authorization: Bearer ${{ secrets.KFDB_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/nlm-payload.json \
            && echo "::notice::KFDB MCPServer entity updated" \
            || echo "::warning::KFDB entity update failed (non-blocking; gateway picks up on next sync)"

      - name: Sync server in MCP gateway (instant single-entity refresh)
        if: steps.publish.outcome == 'success'
        run: |
          MCP_GW="${{ vars.MCP_GATEWAY_URL || 'https://mcp.rickydata.org' }}"
          RESPONSE=$(curl -s --max-time 30 -X POST "$MCP_GW/health/reload/${{ env.SERVER_ID }}" \
            -H "Authorization: Bearer ${{ secrets.OPERATOR_WALLET_TOKEN }}" \
            -H "Content-Type: application/json" || echo '{"error":"sync failed"}')
          echo "Gateway sync: $RESPONSE"
          echo "$RESPONSE" | grep -q '"updated"' \
            && echo "::notice::MCP gateway synced notebooklm-mcp v${{ steps.ver.outputs.version }}" \
            || echo "::warning::gateway single-server sync failed (will pick up on next 10-min cycle)"

      - name: Commit version bump
        if: steps.publish.outcome == 'success' && inputs.skip_version_bump != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          node -e "
            const fs = require('fs');
            const p = require('./packages/notebooklm-mcp/package.json');
            p.version = '${{ steps.ver.outputs.version }}';
            fs.writeFileSync('./packages/notebooklm-mcp/package.json', JSON.stringify(p, null, 2) + '\n');
          "
          git add packages/notebooklm-mcp/package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(notebooklm-mcp): publish v${{ steps.ver.outputs.version }}"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main
            done
          fi

      - name: Summary
        if: always()
        run: |
          echo "## notebooklm-mcp Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${{ steps.ver.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tools**: ${{ steps.tools.outputs.names }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Already on npm**: ${{ steps.check.outputs.exists }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Publish**: ${{ steps.publish.outcome || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
