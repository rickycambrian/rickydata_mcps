name: Publish kfdb-code-mcp

on:
  push:
    paths: ['packages/kfdb-code-mcp/package.json']
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_version_bump:
        description: 'Skip version bump (publish current version)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: publish-kfdb-code-mcp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # Deterministic install from the committed root lockfile.
        run: npm ci --no-audit --no-fund

      - name: Ensure Linux rollup binary (npm optional-deps bug workaround)
        # The lockfile was generated on macOS, so it lacks a package record for
        # the linux rollup native binary that vitest/rollup needs at runtime
        # (npm/cli#4828). Install the platform-matched binary explicitly, pinned
        # to the resolved rollup version, without touching the lockfile.
        run: |
          ROLLUP_VERSION=$(node -p "require('rollup/package.json').version")
          npm install --no-save --no-audit --no-fund \
            "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"

      - name: Build
        run: npm run build --workspace @rickydata/kfdb-code-mcp

      - name: Test
        run: npm run test --workspace @rickydata/kfdb-code-mcp

      - name: Verify tool counts (mode + API-key gating, stdio tools/list)
        id: tools
        run: |
          init='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}'
          list='{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'
          extract='let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{for(const l of d.split("\n")){if(!l.trim())continue;let o;try{o=JSON.parse(l)}catch{continue};if(o.id===2){console.log(o.result.tools.length)}}})'
          count() { printf '%s\n%s\n' "$init" "$list" | env "$@" node packages/kfdb-code-mcp/dist/index.js 2>/dev/null | node -e "$extract"; }

          # Full mode + API key = all 7 tools (key unused by tools/list; no network).
          FULL=$(count KFDB_API_KEY=ci-dummy)
          # Full mode, no key = 7 - 2 ego tools = 5.
          FULL_NOKEY=$(count KFDB_API_KEY=)
          # Bench mode + explicit bench-tools key = 5 scoped tools.
          BENCH=$(count KFDB_BENCH_REPO_SCOPE=11111111-1111-1111-1111-111111111111 KFDB_BENCH_TOOLS_API_KEY=ci-dummy)
          # Bench mode, no key = 3 public scoped tools (this is the pilot config).
          BENCH_NOKEY=$(count KFDB_BENCH_REPO_SCOPE=11111111-1111-1111-1111-111111111111 KFDB_API_KEY=)
          # Gate B #7 env-leak: bench mode + ambient KFDB_API_KEY but NO bench-tools key
          # must STAY at 3 (ambient key must not promote the arm to 5).
          BENCH_LEAK=$(count KFDB_BENCH_REPO_SCOPE=11111111-1111-1111-1111-111111111111 KFDB_API_KEY=leaked-runner-key)

          echo "count=$FULL" >> "$GITHUB_OUTPUT"
          echo "::notice::tools — full(key)=$FULL full(nokey)=$FULL_NOKEY bench(toolskey)=$BENCH bench(nokey)=$BENCH_NOKEY bench(ambient-leak)=$BENCH_LEAK"
          fail=0
          [ "$FULL" -eq 7 ] || { echo "::error::full+key expected 7, got $FULL"; fail=1; }
          [ "$FULL_NOKEY" -eq 5 ] || { echo "::error::full+nokey expected 5, got $FULL_NOKEY"; fail=1; }
          [ "$BENCH" -eq 5 ] || { echo "::error::bench+toolskey expected 5, got $BENCH"; fail=1; }
          [ "$BENCH_LEAK" -eq 3 ] || { echo "::error::bench+ambient-leak expected 3 (env-leak guard), got $BENCH_LEAK"; fail=1; }
          [ "$BENCH_NOKEY" -eq 3 ] || { echo "::error::bench+nokey expected 3, got $BENCH_NOKEY"; fail=1; }
          [ "$fail" -eq 0 ] || exit 1

      - name: Bump patch version
        if: inputs.skip_version_bump != 'true'
        run: npm version patch --no-git-tag-version --workspace @rickydata/kfdb-code-mcp

      - name: Capture version
        id: ver
        run: |
          VERSION=$(node -p "require('./packages/kfdb-code-mcp/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Skip if already published
        id: check
        run: |
          if npm view "@rickydata/kfdb-code-mcp@${{ steps.ver.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@rickydata/kfdb-code-mcp@${{ steps.ver.outputs.version }} already on npm; skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        id: publish
        if: steps.check.outputs.exists == 'false'
        # Publish from inside the package dir (NOT `npm publish --workspace`,
        # which 404s on first publish of a new scoped package). Mirrors the
        # working agent0-mcp / siyuan-mcp publish workflows.
        working-directory: packages/kfdb-code-mcp
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Update KFDB MCPServer entity (version + tools_available)
        if: steps.publish.outcome == 'success'
        # Deterministic MCPServer id = uuidv5(DNS, "@rickydata/kfdb-code-mcp").
        # Extract the full-mode tool list (with a dummy key so all 7 tools list)
        # and update_node so the marketplace gateway has tools_available.
        run: |
          ( printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' ; sleep 2 ) \
            | KFDB_API_KEY=ci-dummy node packages/kfdb-code-mcp/dist/index.js 2>/dev/null \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{for(const l of d.split('\n')){if(!l.trim())continue;let o;try{o=JSON.parse(l)}catch{continue};if(o.id===2)require('fs').writeFileSync('/tmp/tools_available.json',JSON.stringify(o.result.tools))}})"
          node -e "
            const fs=require('fs');
            const tools=JSON.parse(fs.readFileSync('/tmp/tools_available.json','utf8'));
            const v='${{ steps.ver.outputs.version }}';
            const payload={operations:[{operation:'update_node',id:'b437f112-abcb-550d-8e75-1343b15bff05',label:'MCPServer',properties:{
              version:{String:v}, latest_version:{String:v}, tools_count:{Integer:tools.length},
              tools_available:{String:JSON.stringify(tools)},
              install_command:{String:'npx -y @rickydata/kfdb-code-mcp@'+v},
              run_command:{String:'npx -y @rickydata/kfdb-code-mcp@'+v},
              enriched_at:{String:new Date().toISOString()}, enrichment_version:{Integer:5},
            }}]};
            fs.writeFileSync('/tmp/kfdb-payload.json', JSON.stringify(payload));
            console.log('KFDB payload: '+tools.length+' tools, v'+v);
          "
          curl -sf -X POST "${{ vars.KFDB_URL || 'http://34.60.37.158' }}/api/v1/write" \
            -H "Authorization: Bearer ${{ secrets.KFDB_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/kfdb-payload.json \
            && echo "::notice::KFDB MCPServer entity updated" \
            || echo "::warning::KFDB entity update failed (non-blocking; gateway picks up on next sync)"

      - name: Sync server in MCP gateway (instant single-entity refresh)
        if: steps.publish.outcome == 'success'
        run: |
          MCP_GW="${{ vars.MCP_GATEWAY_URL || 'https://mcp.rickydata.org' }}"
          RESPONSE=$(curl -s --max-time 30 -X POST "$MCP_GW/health/reload/b437f112-abcb-550d-8e75-1343b15bff05" \
            -H "Authorization: Bearer ${{ secrets.OPERATOR_WALLET_TOKEN }}" \
            -H "Content-Type: application/json" || echo '{"error":"sync failed"}')
          echo "Gateway sync: $RESPONSE"
          echo "$RESPONSE" | grep -q '"updated"' \
            && echo "::notice::MCP gateway synced kfdb-code-mcp v${{ steps.ver.outputs.version }}" \
            || echo "::warning::gateway single-server sync failed (will pick up on next 10-min cycle)"

      - name: Commit version bump
        if: steps.publish.outcome == 'success' && inputs.skip_version_bump != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          node -e "
            const fs = require('fs');
            const p = require('./packages/kfdb-code-mcp/package.json');
            p.version = '${{ steps.ver.outputs.version }}';
            fs.writeFileSync('./packages/kfdb-code-mcp/package.json', JSON.stringify(p, null, 2) + '\n');
          "
          git add packages/kfdb-code-mcp/package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(kfdb-code-mcp): publish v${{ steps.ver.outputs.version }}"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main
            done
          fi

      - name: Summary
        if: always()
        run: |
          echo "## kfdb-code-mcp Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${{ steps.ver.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tools (full)**: ${{ steps.tools.outputs.count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Already on npm**: ${{ steps.check.outputs.exists }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Publish**: ${{ steps.publish.outcome || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
