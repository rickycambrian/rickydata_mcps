name: Publish agent0-mcp

on:
  push:
    paths: ['packages/agent0-mcp/package.json']
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_version_bump:
        description: 'Skip version bump (publish current version)'
        required: false
        default: 'false'
        type: boolean

defaults:
  run:
    working-directory: packages/agent0-mcp

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install root dependencies
        run: npm install
        working-directory: .

      - name: Build
        run: |
          rm -rf dist
          npx tsc --skipLibCheck

      - name: Verify tool count and export tool definitions
        id: tools
        run: |
          # Export tool count AND full tool definitions (tools_available) for KFDB
          node -e "
            import('./dist/tools/index.js').then(m => {
              const tools = m.TOOLS;
              console.log('Tool count: ' + tools.length);

              // Write tool definitions as JSON for KFDB tools_available
              const toolDefs = tools.map(t => ({
                name: t.name,
                description: t.description || '',
                inputSchema: t.inputSchema || {},
              }));
              require('fs').writeFileSync('/tmp/tools_available.json', JSON.stringify(toolDefs));
              console.log('Wrote ' + toolDefs.length + ' tool definitions to /tmp/tools_available.json');
            });
          "
          TOOL_COUNT=$(node -e "import('./dist/tools/index.js').then(m => console.log(m.TOOLS.length))")
          echo "tool_count=$TOOL_COUNT" >> $GITHUB_OUTPUT
          if [ "$TOOL_COUNT" -lt 25 ]; then
            echo "::error::Expected at least 25 tools (20 + 5 KFDB), got $TOOL_COUNT"
            exit 1
          fi

      - name: Run tests
        run: npx vitest run 2>/dev/null || echo "Tests skipped"

      - name: Bump patch version
        if: inputs.skip_version_bump != 'true'
        id: version
        run: |
          OLD_VERSION=$(node -p "require('./package.json').version")
          npm version patch --no-git-tag-version 2>/dev/null || true
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "old_version=$OLD_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Capture version
        id: ver
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm
        id: publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Post-publish pipeline (matches sync-agent0-sdk.yml) ──

      - name: Notify mcp_deployments_registry
        if: steps.publish.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.DEPLOYMENTS_REGISTRY_PAT }}
        run: |
          gh api repos/rickycambrian/mcp_deployments_registry/dispatches \
            -f event_type=rickydata-mcps-published \
            -f "client_payload[package]=@rickydata/agent0-mcp" \
            -f "client_payload[version]=${{ steps.ver.outputs.version }}" || true

      - name: Update KFDB MCPServer entity (version + tools_available)
        if: steps.publish.outcome == 'success'
        run: |
          # Build KFDB payload with tools_available from the build step
          # CRITICAL: tools_available MUST be included or the MCP gateway's ToolAggregator
          # won't create slug-based tool names, causing "Server not found" errors.
          TOOLS_JSON=$(cat /tmp/tools_available.json)
          node -e "
            const fs = require('fs');
            const tools = JSON.parse(fs.readFileSync('/tmp/tools_available.json', 'utf8'));
            const payload = {
              operations: [{
                operation: 'update_node',
                id: '55abe175-5f8d-436b-98ec-98fb87a655c4',
                properties: {
                  version: { String: '${{ steps.ver.outputs.version }}' },
                  tools_count: { Integer: tools.length },
                  tools_available: { String: JSON.stringify(tools) },
                  install_command: { String: 'npx -y @rickydata/agent0-mcp@${{ steps.ver.outputs.version }}' },
                  run_command: { String: 'npx -y @rickydata/agent0-mcp@${{ steps.ver.outputs.version }}' },
                  enriched_at: { String: new Date().toISOString() },
                  enrichment_version: { Integer: 5 },
                },
              }],
            };
            fs.writeFileSync('/tmp/kfdb-payload.json', JSON.stringify(payload));
            console.log('KFDB payload: ' + tools.length + ' tools, version ${{ steps.ver.outputs.version }}');
          "
          curl -sf -X POST "${{ vars.KFDB_URL || 'http://34.60.37.158' }}/api/v1/write" \
            -H "Authorization: Bearer ${{ secrets.KFDB_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/kfdb-payload.json \
            && echo "::notice::KFDB entity updated with tools_available" \
            || echo "::warning::KFDB update failed (non-blocking)"

      - name: Sync server in MCP gateway (instant single-entity refresh)
        if: steps.publish.outcome == 'success'
        run: |
          MCP_GW="${{ vars.MCP_GATEWAY_URL || 'https://mcp.rickydata.org' }}"
          TOKEN="${{ secrets.OPERATOR_WALLET_TOKEN }}"
          SERVER_ID="55abe175-5f8d-436b-98ec-98fb87a655c4"

          # Single-server sync: fetches just this entity from KFDB and updates gateway in-memory.
          # Much faster than full reload (which pages through 100K+ entities and times out).
          echo "Syncing server $SERVER_ID in MCP gateway..."
          RESPONSE=$(curl -s --max-time 30 -X POST "$MCP_GW/health/reload/$SERVER_ID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" || echo '{"error":"sync failed"}')
          echo "Sync response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"updated"'; then
            echo "::notice::MCP gateway synced agent0-mcp v${{ steps.ver.outputs.version }}"
          else
            echo "::warning::MCP gateway single-server sync failed (will pick up on next 10-min cycle): $RESPONSE"
          fi

          # Restart the container to pull new npm version
          echo "Stopping agent0-mcp container..."
          curl -sf --max-time 15 -X POST "$MCP_GW/api/servers/$SERVER_ID/stop" \
            -H "Authorization: Bearer $TOKEN" || echo "::warning::Stop failed (may not be running)"
          sleep 5
          echo "Starting agent0-mcp container (will pull v${{ steps.ver.outputs.version }})..."
          START_RESPONSE=$(curl -s --max-time 30 -X POST "$MCP_GW/api/servers/$SERVER_ID/start" \
            -H "Authorization: Bearer $TOKEN" || echo '{"error":"start failed"}')
          echo "Start response: $START_RESPONSE"
          if echo "$START_RESPONSE" | grep -q '"started"'; then
            echo "::notice::Container restarted with v${{ steps.ver.outputs.version }}"
          else
            echo "::warning::Container restart may have failed: $START_RESPONSE"
          fi

      - name: Reload agent gateway (refresh MCP tool cache)
        if: steps.publish.outcome == 'success'
        run: |
          RESPONSE=$(curl -s --max-time 30 -X POST "${{ vars.AGENT_GATEWAY_URL || 'https://agents.rickydata.org' }}/health/reload" \
            -H "Authorization: Bearer ${{ secrets.OPERATOR_WALLET_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Agent gateway reload: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"reloaded"'; then
            echo "::notice::Agent gateway reloaded"
          else
            echo "::warning::Agent gateway reload may have failed (non-blocking)"
          fi

      - name: Production verification
        if: steps.publish.outcome == 'success'
        id: verify
        run: |
          chmod +x scripts/verify-production.sh
          if scripts/verify-production.sh; then
            echo "verified=true" >> $GITHUB_OUTPUT
          else
            echo "verified=false" >> $GITHUB_OUTPUT
          fi
        env:
          MCP_GATEWAY_URL: ${{ vars.MCP_GATEWAY_URL || 'https://mcp.rickydata.org' }}
          OPERATOR_WALLET_TOKEN: ${{ secrets.OPERATOR_WALLET_TOKEN }}

      - name: Commit version changes
        if: steps.publish.outcome == 'success' && inputs.skip_version_bump != 'true'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/agent0-mcp/package.json packages/agent0-mcp/package-lock.json 2>/dev/null || true
          git commit -m "chore(agent0-mcp): publish v${{ steps.ver.outputs.version }}" || true
          git push

      - name: Create summary
        if: always()
        run: |
          echo "## agent0-mcp Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.ver.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tools**: ${{ steps.tools.outputs.tool_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Publish**: ${{ steps.publish.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Verified**: ${{ steps.verify.outputs.verified || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
