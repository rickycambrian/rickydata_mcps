name: siyuan-mcp CI

on:
  pull_request:
    paths:
      - 'packages/siyuan-mcp/**'
      - '.github/workflows/siyuan-mcp-ci.yml'
  push:
    branches: [main]
    paths:
      - 'packages/siyuan-mcp/**'
      - '.github/workflows/siyuan-mcp-ci.yml'

concurrency:
  group: siyuan-mcp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/siyuan-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install workspace dependencies
        # The lockfile is authored on macOS and pins the darwin rollup native
        # binary but not @rollup/rollup-linux-x64-gnu (npm/cli#4828). Remove
        # the lockfile so `npm install` re-resolves platform-specific
        # optionalDependencies on ubuntu-latest.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
        working-directory: .

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
