name: siyuan-mcp CI

on:
  pull_request:
    paths:
      - 'packages/siyuan-mcp/**'
      - '.github/workflows/siyuan-mcp-ci.yml'
  push:
    branches: [main]
    paths:
      - 'packages/siyuan-mcp/**'
      - '.github/workflows/siyuan-mcp-ci.yml'

concurrency:
  group: siyuan-mcp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/siyuan-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci
        working-directory: .

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
