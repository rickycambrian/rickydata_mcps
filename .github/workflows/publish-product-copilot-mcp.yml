name: Publish product-copilot-mcp

on:
  push:
    paths: ['packages/product-copilot-mcp/package.json']
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_version_bump:
        description: 'Skip version bump (publish current version)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: publish-product-copilot-mcp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Ensure Linux rollup binary (npm optional-deps bug workaround)
        run: |
          ROLLUP_VERSION=$(node -p "require('rollup/package.json').version")
          npm install --no-save --no-audit --no-fund \
            "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"

      - name: Build
        run: npm run build --workspace @rickydata/product-copilot-mcp

      - name: Test
        run: npm run test --workspace @rickydata/product-copilot-mcp

      - name: Verify tool count from package exports
        id: tools
        run: |
          COUNT=$(node --input-type=module - <<'NODE'
          import { TOOL_DEFS } from './packages/product-copilot-mcp/dist/tools.js';
          console.log(TOOL_DEFS.length);
          NODE
          )
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::product-copilot-mcp exposes $COUNT tools"
          if [ "$COUNT" -ne 8 ]; then
            echo "::error::Expected exactly 8 Product Copilot tools, got $COUNT"
            exit 1
          fi

      - name: Bump patch version
        if: inputs.skip_version_bump != true
        run: npm version patch --no-git-tag-version --workspace @rickydata/product-copilot-mcp

      - name: Capture version
        id: ver
        run: |
          VERSION=$(node -p "require('./packages/product-copilot-mcp/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Skip if already published
        id: check
        run: |
          if npm view "@rickydata/product-copilot-mcp@${{ steps.ver.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@rickydata/product-copilot-mcp@${{ steps.ver.outputs.version }} already on npm; skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        id: publish
        if: steps.check.outputs.exists == 'false'
        working-directory: packages/product-copilot-mcp
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Update KFDB MCPServer entity (version + tools_available)
        if: steps.publish.outcome == 'success'
        # Canonical MCPServer id from the existing public gateway catalog entry.
        env:
          KFDB_API_KEY: ${{ secrets.KFDB_API_KEY }}
        run: |
          node --input-type=module - <<'NODE'
            import { writeFileSync } from 'node:fs';
            import { TOOL_DEFS } from './packages/product-copilot-mcp/dist/tools.js';
            writeFileSync('/tmp/tools_available.json', JSON.stringify(TOOL_DEFS));
          NODE
          node -e "
            const fs=require('fs');
            const tools=JSON.parse(fs.readFileSync('/tmp/tools_available.json','utf8'));
            const v='${{ steps.ver.outputs.version }}';
            const requiredEnvVars=[];
            const secretsRequired=[];
            const properties={
              name:{String:'@rickydata/product-copilot-mcp'}, title:{String:'Product Copilot MCP'},
              description:{String:'Private-only Product Copilot roadmap, release-readiness, private tenant setup, screenshot-gate, Mom Test evidence, and human-approval blocker tools.'},
              registry_type:{String:'npm'}, version:{String:v}, latest_version:{String:v},
              tools_count:{Integer:tools.length}, tools_available:{String:JSON.stringify(tools)},
              install_command:{String:'npx -y @rickydata/product-copilot-mcp@'+v},
              run_command:{String:'npx -y @rickydata/product-copilot-mcp@'+v},
              transport_type:{String:'stdio'}, gateway_compatible:{Boolean:true}, gateway_safe:{Boolean:true},
              requires_auth:{Boolean:true}, required_env_vars:{String:JSON.stringify(requiredEnvVars)}, secrets_required:{String:JSON.stringify(secretsRequired)},
              credential_binding:{String:'logged_in_wallet_platform_context'}, sharing_policy:{String:'private_tenant_only'},
              enriched_at:{String:new Date().toISOString()}, enrichment_version:{Integer:6},
            };
            const id='7b00f8f8-afdd-402d-9d3f-5ee8a979ec98';
            fs.writeFileSync('/tmp/product-copilot-update.json', JSON.stringify({operations:[{operation:'update_node',id,label:'MCPServer',properties}]}));
            fs.writeFileSync('/tmp/product-copilot-create.json', JSON.stringify({operations:[{operation:'create_node',id,label:'MCPServer',properties}]}));
            console.log('KFDB payload: '+tools.length+' tools, v'+v);
          "
          KFDB_URL="${{ vars.KFDB_URL || 'http://34.60.37.158' }}"
          if curl -sf -X POST "$KFDB_URL/api/v1/write" \
            -H "Authorization: Bearer $KFDB_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/product-copilot-update.json; then
            echo "::notice::KFDB MCPServer entity updated"
          elif curl -sf -X POST "$KFDB_URL/api/v1/write" \
            -H "Authorization: Bearer $KFDB_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/product-copilot-create.json; then
            echo "::notice::KFDB MCPServer entity created"
          else
            echo "::warning::KFDB entity create/update failed (non-blocking; gateway picks up on next sync)"
          fi

      - name: Sync server in MCP gateway (instant single-entity refresh)
        if: steps.publish.outcome == 'success'
        env:
          OPERATOR_WALLET_TOKEN: ${{ secrets.OPERATOR_WALLET_TOKEN }}
        run: |
          MCP_GW="${{ vars.MCP_GATEWAY_URL || 'https://mcp.rickydata.org' }}"
          RESPONSE=$(curl -s --max-time 30 -X POST "$MCP_GW/health/reload/7b00f8f8-afdd-402d-9d3f-5ee8a979ec98" \
            -H "Authorization: Bearer $OPERATOR_WALLET_TOKEN" \
            -H "Content-Type: application/json" || echo '{"error":"sync failed"}')
          echo "Gateway sync: $RESPONSE"
          echo "$RESPONSE" | grep -q '"updated"' \
            && echo "::notice::MCP gateway synced product-copilot-mcp v${{ steps.ver.outputs.version }}" \
            || echo "::warning::gateway single-server sync failed (will pick up on next cycle)"

      - name: Commit version bump
        if: steps.publish.outcome == 'success' && inputs.skip_version_bump != true
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          node -e "
            const fs = require('fs');
            const p = require('./packages/product-copilot-mcp/package.json');
            p.version = '${{ steps.ver.outputs.version }}';
            fs.writeFileSync('./packages/product-copilot-mcp/package.json', JSON.stringify(p, null, 2) + '\n');
          "
          git add packages/product-copilot-mcp/package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(product-copilot-mcp): publish v${{ steps.ver.outputs.version }}"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main
            done
          fi

      - name: Summary
        if: always()
        run: |
          echo "## product-copilot-mcp Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${{ steps.ver.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tools**: ${{ steps.tools.outputs.count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Already on npm**: ${{ steps.check.outputs.exists }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Publish**: ${{ steps.publish.outcome || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
