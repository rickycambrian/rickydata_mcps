name: Publish knowledge-work-mcp

on:
  push:
    paths: ['packages/knowledge-work-mcp/package.json']
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_version_bump:
        description: 'Skip version bump (publish current version)'
        required: false
        default: 'false'
        type: boolean
      refresh_source:
        description: 'Refresh the existing source-backed gateway server without publishing npm'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: publish-knowledge-work-mcp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Ensure Linux rollup binary
        run: |
          ROLLUP_VERSION=$(node -p "require('rollup/package.json').version")
          npm install --no-save --no-audit --no-fund \
            "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"

      - name: Build
        run: npm run build --workspace @rickydata/knowledge-work-mcp

      - name: Test
        run: npm run test --workspace @rickydata/knowledge-work-mcp

      - name: Verify tool count
        id: tools
        run: |
          COUNT=$(printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | node packages/knowledge-work-mcp/dist/index.js 2>/dev/null \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{for(const l of d.split('\n')){if(!l.trim())continue;let o;try{o=JSON.parse(l)}catch{continue};if(o.id===2){console.log(o.result.tools.length)}}})")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::knowledge-work-mcp exposes $COUNT tools"
          if [ "$COUNT" -ne 15 ]; then
            echo "::error::Expected 15 tools, got $COUNT"
            exit 1
          fi

      - name: Bump patch version
        if: inputs.skip_version_bump != true && inputs.refresh_source != true
        run: npm version patch --no-git-tag-version --workspace @rickydata/knowledge-work-mcp

      - name: Capture version
        id: ver
        run: |
          VERSION=$(node -p "require('./packages/knowledge-work-mcp/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Skip if already published
        id: check
        if: inputs.refresh_source != true
        run: |
          if npm view "@rickydata/knowledge-work-mcp@${{ steps.ver.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@rickydata/knowledge-work-mcp@${{ steps.ver.outputs.version }} already on npm; skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        id: publish
        if: inputs.refresh_source != true && steps.check.outputs.exists == 'false'
        # Publish from inside the package dir. `npm publish --workspace` can
        # 404 on first publish of a new scoped package.
        working-directory: packages/knowledge-work-mcp
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Verify published package
        if: inputs.refresh_source != true
        run: |
          PUBLISHED=$(npm view "@rickydata/knowledge-work-mcp@${{ steps.ver.outputs.version }}" version)
          test "$PUBLISHED" = "${{ steps.ver.outputs.version }}"
          echo "::notice::Verified @rickydata/knowledge-work-mcp@$PUBLISHED on npm"

      - name: Resolve registry mode
        id: registry
        run: |
          if [ "${{ inputs.refresh_source }}" = "true" ]; then
            echo "type=git" >> "$GITHUB_OUTPUT"
            echo "::notice::Refreshing source-backed knowledge-work-mcp"
          else
            echo "type=npm" >> "$GITHUB_OUTPUT"
            echo "::notice::Registering npm-backed knowledge-work-mcp"
          fi

      - name: Build KFDB MCPServer payload
        id: payload
        run: |
          ( printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' ; sleep 2 ) \
            | node packages/knowledge-work-mcp/dist/index.js 2>/dev/null \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{for(const l of d.split('\n')){if(!l.trim())continue;let o;try{o=JSON.parse(l)}catch{continue};if(o.id===2)require('fs').writeFileSync('/tmp/tools_available.json',JSON.stringify(o.result.tools))}})"
          node -e "
            const fs=require('fs');
            const tools=JSON.parse(fs.readFileSync('/tmp/tools_available.json','utf8'));
            const v='${{ steps.ver.outputs.version }}';
            const registryType='${{ steps.registry.outputs.type }}';
            const pkg='@rickydata/knowledge-work-mcp';
            const sourceRepository='https://github.com/rickycambrian/rickydata_mcps';
            const packageSubdir='packages/knowledge-work-mcp';
            const optionalSecrets=[
              {name:'S2D_SESSION_ID',description:'Pre-minted KFDB sign-to-derive session id (keyless delegation; preferred over KNOWLEDGE_MCP_PRIVATE_KEY).',required:false},
              {name:'S2D_DERIVED_KEY',description:'Derived key hex for the pre-minted S2D session (paired with S2D_SESSION_ID).',required:false},
              {name:'KNOWLEDGE_MCP_PRIVATE_KEY',description:'Legacy: wallet private key used to mint home scwt_ tokens and self-mint S2D derive sessions. Superseded by S2D_SESSION_ID/S2D_DERIVED_KEY.',required:false},
              {name:'KFDB_WALLET_ADDRESS',description:'Wallet address for S2D derive headers.',required:false},
              {name:'KFDB_API_KEY',description:'KFDB API key fallback for legacy deployments.',required:false},
              {name:'HOME_API_URL',description:'Home API URL override; defaults to https://rickydata-home-2dbp4scmrq-uc.a.run.app.',required:false},
              {name:'KFDB_API_URL',description:'KFDB API URL override; defaults to https://db.rickydata.org.',required:false}
            ];
            const installCommand=registryType === 'npm'
              ? 'npx -y @rickydata/knowledge-work-mcp@'+v
              : 'git clone '+sourceRepository+' && cd rickydata_mcps/'+packageSubdir+' && npm install && npm run build';
            const runCommand=registryType === 'npm'
              ? 'npx -y @rickydata/knowledge-work-mcp@'+v
              : 'npm start';
            const payload={operations:[{operation:'create_node',id:'3883e5df-de92-5c4d-9c09-f4f79a62e22d',label:'MCPServer',mode:'merge',properties:{
              name:{String:'knowledge-work-mcp'},
              server_name:{String:'knowledge-work-mcp'},
              package_identifier:{String:pkg},
              version:{String:v}, latest_version:{String:v}, tools_count:{Integer:tools.length},
              tools_available:{String:JSON.stringify(tools)},
              install_command:{String:installCommand},
              run_command:{String:runCommand},
              enriched_at:{String:new Date().toISOString()}, enrichment_version:{Integer:5},
              description:{String:'RickyData voice knowledge partner MCP for cited knowledge retrieval, interview mode, HITL capture, and enrichment-loop workflows.'},
              gateway_compatible:{Boolean:true},
              gateway_runnable:{Boolean:true},
              registry_type:{String:registryType},
              deployment_type:{String:'local_tool'},
              transport_type:{String:'stdio'},
              can_run_standalone:{Boolean:true},
              gateway_safe:{Boolean:true},
              gateway_recommendation:{String:'APPROVED'},
              security_score:{Integer:90},
              security_risk:{String:'safe'},
              gateway_security_score:{Integer:85},
              gateway_risk_score:{Integer:15},
              required_env_vars:{String:JSON.stringify([])},
              secrets_required:{String:JSON.stringify(optionalSecrets)},
              required_credentials:{String:JSON.stringify([])},
              secrets_optional:{String:JSON.stringify(optionalSecrets)},
              external_services:{String:JSON.stringify(['rickydata'])},
              categories:{String:JSON.stringify(['Knowledge', 'Voice', 'RickyData'])},
              admin_hidden:{Boolean:false},
              source_repository:{String:sourceRepository},
              repository_url:{String:sourceRepository},
              repository_subfolder:{String:packageSubdir},
              package_subdir:{String:packageSubdir},
              last_enriched_commit_sha:{String:'${{ github.sha }}'},
            }}]};
            fs.writeFileSync('/tmp/knowledge-work-payload.json', JSON.stringify(payload));
            console.log('KFDB payload: '+tools.length+' tools, v'+v+', registry='+registryType);
          "

      - name: POST MCPServer entity to KFDB
        id: kfdb
        run: |
          curl -sf -X POST "${{ vars.KFDB_URL || 'http://34.60.37.158' }}/api/v1/write" \
            -H "Authorization: Bearer ${{ secrets.KFDB_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/knowledge-work-payload.json \
            | tee /tmp/knowledge-work-kfdb-response.json
          echo "node_id=3883e5df-de92-5c4d-9c09-f4f79a62e22d" >> "$GITHUB_OUTPUT"
          echo "::notice::KFDB MCPServer entity registered as 3883e5df-de92-5c4d-9c09-f4f79a62e22d"

      - name: Sync server in MCP gateway (instant single-entity refresh)
        run: |
          MCP_GW="${{ vars.MCP_GATEWAY_URL || 'https://mcp.rickydata.org' }}"
          STOP_RESPONSE=$(curl -sf --max-time 30 -X POST "$MCP_GW/api/servers/${{ steps.kfdb.outputs.node_id }}/stop" \
            -H "Authorization: Bearer ${{ secrets.OPERATOR_WALLET_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Gateway stop: $STOP_RESPONSE"
          RESPONSE=$(curl -s --max-time 30 -X POST "$MCP_GW/health/reload/${{ steps.kfdb.outputs.node_id }}" \
            -H "Authorization: Bearer ${{ secrets.OPERATOR_WALLET_TOKEN }}" \
            -H "Content-Type: application/json" || echo '{"error":"sync failed"}')
          echo "Gateway sync: $RESPONSE"
          echo "$RESPONSE" | grep -q '"updated"' \
            && echo "::notice::MCP gateway synced knowledge-work-mcp v${{ steps.ver.outputs.version }}" \
            || echo "::warning::gateway single-server sync failed (will pick up on next 10-min cycle)"

      - name: Verify production source commit
        if: inputs.refresh_source == true
        timeout-minutes: 15
        run: |
          MCP_GW="${{ vars.MCP_GATEWAY_URL || 'https://mcp.rickydata.org' }}"
          SERVER_ID="${{ steps.kfdb.outputs.node_id }}"
          for attempt in $(seq 1 90); do
            BODY=$(curl -fsS --max-time 30 "$MCP_GW/api/servers/$SERVER_ID" || true)
            SHA=$(printf '%s' "$BODY" | jq -r '.lastEnrichedCommitSha // empty' 2>/dev/null || true)
            COUNT=$(printf '%s' "$BODY" | jq -r '.toolsCount // 0' 2>/dev/null || true)
            if [ "$SHA" = "${{ github.sha }}" ] && [ "$COUNT" -eq 15 ]; then
              echo "::notice::Production exposes $SHA with $COUNT tools"
              exit 0
            fi
            echo "Waiting for production source refresh (attempt $attempt/90, sha=${SHA:-missing}, tools=${COUNT:-0})"
            sleep 10
          done
          echo "::error::Production did not expose ${{ github.sha }} with 15 tools"
          exit 1

      - name: Commit version bump
        if: steps.publish.outcome == 'success' && inputs.skip_version_bump != true && inputs.refresh_source != true
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          node -e "
            const fs = require('fs');
            const p = require('./packages/knowledge-work-mcp/package.json');
            p.version = '${{ steps.ver.outputs.version }}';
            fs.writeFileSync('./packages/knowledge-work-mcp/package.json', JSON.stringify(p, null, 2) + '\n');
          "
          git add packages/knowledge-work-mcp/package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(knowledge-work-mcp): publish v${{ steps.ver.outputs.version }}"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main
            done
          fi

      - name: Summary
        if: always()
        run: |
          echo "## knowledge-work-mcp Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: ${{ steps.ver.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tools**: ${{ steps.tools.outputs.count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Already on npm**: ${{ steps.check.outputs.exists }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Publish**: ${{ steps.publish.outcome || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Registry mode**: ${{ steps.registry.outputs.type || 'unknown' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **MCPServer id**: 3883e5df-de92-5c4d-9c09-f4f79a62e22d" >> "$GITHUB_STEP_SUMMARY"
